name: Build Mod Menu
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos & ldid
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $GITHUB_WORKSPACE/sdks-repo
          mv $GITHUB_WORKSPACE/sdks-repo/*.sdk $GITHUB_WORKSPACE/theos/sdks/
          rm -rf $GITHUB_WORKSPACE/sdks-repo

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1 THEOS=$GITHUB_WORKSPACE/theos
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Menu-File
          path: |
            .theos/obj/*.dylib
            packages/*.deb
