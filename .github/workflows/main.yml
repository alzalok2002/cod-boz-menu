name: Build Mod Menu
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          mkdir -p ~/theos/sdks
          # استخدام رابط الـ Raw المباشر لضمان تحميل ملف حقيقي وليس صفحة HTML
          curl -kL "https://github.com/theos/sdks/raw/master/iPhoneOS12.2.sdk.tar.xz" -o ~/theos/sdks/sdk.tar.xz
          
          # فك الضغط مع تجاهل الأخطاء البسيطة في الصيغة
          cd ~/theos/sdks
          tar -xJf sdk.tar.xz
          rm sdk.tar.xz

      - name: Build Tweak
        run: |
          # تحديد مسار SDK يدوياً للتأكد من أن المترجم يراه
          export SDKVERSION=12.2
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Menu-Dylib
          path: .theos/obj/debug/*.dylib
