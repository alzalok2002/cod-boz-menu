name: Build Mod Menu
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          mkdir -p ~/theos/sdks
          # تحميل الـ SDK مع التأكد من تتبع الروابط المحولة (Redirects)
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz
          
          # التحقق من أن الملف ليس صفحة ويب (HTML)
          if file ~/theos/sdks/iPhoneOS14.5.sdk.tar.xz | grep -q "HTML"; then
            echo "Error: Downloaded file is HTML, not an archive. Check the URL."
            exit 1
          fi

          cd ~/theos/sdks
          tar -xJf iPhoneOS14.5.sdk.tar.xz # استخدام -xJf لفك ضغط xz بشكل صريح
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Menu-Dylib
          path: .theos/obj/debug/*.dylib
