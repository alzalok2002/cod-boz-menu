name: Build Mod Menu
on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          # هذه الطريقة تضمن تحميل الـ SDK كملف حقيقي وليس صفحة HTML
          mkdir -p ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks-repo
          mv ~/theos/sdks-repo/*.sdk ~/theos/sdks/
          rm -rf ~/theos/sdks-repo

      - name: Build Tweak
        run: |
          # سنترك الثيوس يختار أفضل SDK متاح تلقائياً
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Menu-Dylib
          path: .theos/obj/debug/*.dylib
